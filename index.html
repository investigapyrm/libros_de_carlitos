    <script>
      (function () {
        try {
          var scale = localStorage.getItem("carlitos:viewScale") || "normal";
          document.documentElement.dataset.viewScale = scale;
        } catch (error) {
          document.documentElement.dataset.viewScale = "normal";
        }
      }());
    </script>
